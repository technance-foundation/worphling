name: E2E

on:
    pull_request:
        types: [opened, synchronize, reopened]

jobs:
    e2e:
        runs-on: ubuntu-latest
        timeout-minutes: 20

        env:
            OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

        steps:
            - name: Check out repository
              uses: actions/checkout@v4

            - name: Set up pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10.6.5

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24.14.0
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build Worphling package
              run: pnpm --filter @technance/worphling build

            - name: Probe OpenAI connectivity
              run: |
                  curl -sS -o /dev/null -w "DNS: %{time_namelookup}s\nConnect: %{time_connect}s\nTTFB: %{time_starttransfer}s\nTotal: %{time_total}s\n" \
                    https://api.openai.com/v1/models \
                    -H "Authorization: Bearer $OPENAI_API_KEY"

            - name: Run playground E2E
              working-directory: apps/playground
              run: pnpm e2e:ci

            - name: Upload playground artifacts
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: playground-e2e-artifacts
                  path: |
                      apps/playground/artifacts
                      apps/playground/locales/es.json
                  if-no-files-found: warn
