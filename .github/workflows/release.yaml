name: Release

on:
    push:
        branches:
            - main
    workflow_dispatch:

concurrency:
    group: release-${{ github.ref }}
    cancel-in-progress: false

jobs:
    release:
        if: github.actor != 'github-actions[bot]'
        runs-on: ubuntu-latest

        permissions:
            contents: write
            id-token: write
            pull-requests: read

        env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            NPM_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}
            PUSH_TOKEN: ${{ secrets.RELEASE_PUSH_TOKEN }}
            NODE_AUTH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}

        steps:
            - name: Run automated release
              uses: technance-foundation/github-actions/release@main
              with:
                  node-version: "24.14.0"
                  pnpm-version: "10.33.0"
                  npm-token: ${{ env.NPM_TOKEN }}
                  push-token: ${{ env.PUSH_TOKEN }}
                  git-user-name: "technance-bot"
                  git-user-email: "technance-bot@users.noreply.github.com"
